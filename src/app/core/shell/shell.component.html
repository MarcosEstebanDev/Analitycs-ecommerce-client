<mat-sidenav-container class="shell-container">

  <!-- ── Sidebar ─────────────────────────────────────────────── -->
  <mat-sidenav #sidenav
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="!(isHandset$ | async)"
    class="sidenav">

    <!-- Brand -->
    <div class="sidenav__brand">
      <div class="sidenav__brand-icon-wrap">
        <mat-icon>analytics</mat-icon>
      </div>
      <div>
        <div class="sidenav__brand-name">Analytics</div>
        <div class="sidenav__brand-sub">E-commerce</div>
      </div>
    </div>

    <!-- Nav links -->
    <nav class="sidenav__nav">
      @for (item of navItems; track item.route) {
        <a class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="nav-item--active"
          (click)="onNavClick()">
          <mat-icon class="nav-item__icon">{{ item.icon }}</mat-icon>
          <span class="nav-item__label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <!-- Footer: tenant info -->
    <div class="sidenav__footer">
      <div class="sidenav__tenant">
        <div class="sidenav__tenant-avatar">
          {{ tenantId.slice(0,2).toUpperCase() }}
        </div>
        <div class="sidenav__tenant-info">
          <span class="sidenav__tenant-label">Tenant ID</span>
          <span class="sidenav__tenant-id" [matTooltip]="tenantId">{{ tenantId | slice:0:12 }}…</span>
        </div>
      </div>
    </div>
  </mat-sidenav>

  <!-- ── Main content ──────────────────────────────────────────── -->
  <mat-sidenav-content class="shell-content">

    <!-- Top bar -->
    <header class="shell-topbar">
      @if (isHandset$ | async) {
        <button mat-icon-button (click)="sidenav.toggle()" class="shell-topbar__menu">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="shell-topbar__spacer"></span>
      <button mat-icon-button (click)="logout()" matTooltip="Cerrar sesión" class="shell-topbar__logout">
        <mat-icon>logout</mat-icon>
      </button>
    </header>

    <!-- Page content -->
    <main class="shell-page">
      <router-outlet />
    </main>

  </mat-sidenav-content>

</mat-sidenav-container>
